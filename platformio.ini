; ============================================================
;  LEO Smart Switch  -  PlatformIO build
;    pio run             -> build
;    pio run -t upload   -> flash firmware
;    pio run -t uploadfs -> flash web UI (data/index.html) to LittleFS
;    pio device monitor  -> serial console
; ============================================================
[platformio]
src_dir = .
data_dir = data

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

board_build.filesystem = littlefs
board_build.partitions = default.csv

; The async stack now lives under the ESP32Async org (the old me-no-dev /
; mathieucarbou packages are archived). These build on Arduino-ESP32 core 3.x.
lib_compat_mode = strict
lib_ldf_mode = chain
lib_deps =
    ESP32Async/ESPAsyncWebServer
    ESP32Async/AsyncTCP
    bblanchon/ArduinoJson @ ^7
    adafruit/Adafruit NeoPixel @ ^1.12

; AsyncTCP task on the C3's single core
build_flags =
    -D CONFIG_ASYNC_TCP_RUNNING_CORE=0
    -D CONFIG_ASYNC_TCP_STACK_SIZE=16384
